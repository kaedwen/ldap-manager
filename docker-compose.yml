version: '3.8'

services:
  ldap-manager:
    image: ghcr.io/kaedwen/ldap-manager:latest
    container_name: ldap-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
      # Health check port (internal only, not exposed to host)
      # - "9090:9090"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      # Authentication mode: "internal" or "proxy"
      - LDAP_MANAGER_SERVER_AUTH_MODE=internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

# For Authelia/OIDC integration with Traefik, see docs/authelia/docker-compose.example.yml
